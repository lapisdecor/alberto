name: alberto
version: "0.1.1"
summary: A portuguese dictionary for the desktop.
description: |
  Portuguese dictionary for the desktop.
  Dicionário de português para o desktop.

platforms:
  platform1:
    build-on: [amd64]
    build-for: [amd64]

grade: stable
confinement: strict
base: core24

apps:
  alberto:
    extensions: [gnome]
    command: bin/alberto
    plugs: [home, network, desktop]

parts:
  nim-compiler:
    plugin: nil
    source: https://github.com/nim-lang/Nim/archive/refs/tags/v2.2.6.tar.gz # Use latest version
    source-type: tar
    build-packages:
      - build-essential
      - tar
      - git
      - xz-utils
    override-build: |
      set -eux
      cd $SNAPCRAFT_PART_SRC
      ./build_all.sh
      ./bin/nim c -d:release koch
      ./koch boot -d:release
      ./koch tools
      mkdir -p $SNAPCRAFT_PART_INSTALL/bin
      cp -r bin/* $SNAPCRAFT_PART_INSTALL/bin/
      cp -r lib $SNAPCRAFT_PART_INSTALL/
      cp -r config $SNAPCRAFT_PART_INSTALL/

  alberto:
    plugin: nil
    after:
      - nim-compiler
    source: .
    build-packages:
      - build-essential
      - pkg-config
      - libgtk-4-dev
    stage-packages:
      - libc6
      - libgtk-4-1

    override-build: |
      set -eux

      nimble install owlkettle --verbose

      # Build the application
      nim c -d:release --out:$SNAPCRAFT_PART_INSTALL/bin/alberto src/alberto.nim
      chmod +x $SNAPCRAFT_PART_INSTALL/bin/alberto
